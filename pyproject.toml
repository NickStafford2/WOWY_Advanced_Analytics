[project]
name = "wowy"
version = "0.0.1"
description = "Simple game-level WOWY basketball impact prototype"
readme = "README.md"
requires-python = ">=3.12,<3.13"
authors = [{ name = "Nicholas Stafford" }]

[project.scripts]
wowy = "src.main:main"

[dependency-groups]
test = ["pytest>=8.0,<9.0"]

[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"
